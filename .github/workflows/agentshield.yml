name: AgentShield

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: AgentShield CI security gate
        run: pnpm cli bench --ci --sarif agentshield.sarif.json --force

      # Optional artifact upload for SARIF inspection. This does not call GitHub code scanning APIs.
      # - name: Upload AgentShield SARIF artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: agentshield-sarif
      #     path: agentshield.sarif.json
